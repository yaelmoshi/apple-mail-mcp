when:
  - event: manual
  - event: [push, pull_request]
    branch: main
  - event: tag

steps:
  - name: lint
    image: dhi.io/uv:0.11.8-debian13-dev@sha256:7836090fee6a7af9e14db5747eda9ad16b1886da3771f4677e9ee160e7722d54
    environment:
      UV_PROJECT_ENVIRONMENT: /tmp/venv
    commands:
      - uv sync --frozen
      - uv run ruff check .
      - uv run ruff format --check .

  - name: check
    image: dhi.io/uv:0.11.8-debian13-dev@sha256:7836090fee6a7af9e14db5747eda9ad16b1886da3771f4677e9ee160e7722d54
    environment:
      UV_PROJECT_ENVIRONMENT: /tmp/venv
    commands:
      - uv sync --frozen
      - uv run python -c "import apple_mail_mcp"
      - uv run python tests/test_runtime_features.py
      - |
        uv run python << 'PYEOF'
        from apple_mail_mcp import mcp
        n = len(mcp._tool_manager._tools)
        assert n == 37, "Expected 37 tools, got %d" % n
        print("OK: %d tools registered" % n)
        PYEOF

  - name: release
    image: dhi.io/node:25.8.1-alpine3.23-dev@sha256:cd633ec63cba04997c43da60a0b98402bd48b7362b47c2adb7c2edc5eff5bd8e
    depends_on:
      - lint
      - check
    when:
      - event: push
        branch: main
    environment:
      GITHUB_TOKEN:
        from_secret: github_token
      GH_TOKEN:
        from_secret: github_token
    commands:
      - apk add --no-cache git
      - git config user.name "woodpecker[bot]"
      - git config user.email "woodpecker@m0sh1.cc"
      - git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/sm-moshi/apple-mail-mcp.git"
      - git fetch --tags origin
      - npm ci
      - npx semantic-release

  - name: build-mcpb
    image: dhi.io/alpine-base:3.23-dev@sha256:f7b74374e3e07e765ff2dabec26e636b55cb222b4e905b9251405ef47637f9af
    depends_on:
      - lint
      - check
    commands:
      - apk add --no-cache bash zip jq
      - |
        if [ -n "${CI_COMMIT_TAG}" ]; then
          export APPLE_MAIL_MCP_VERSION="${CI_COMMIT_TAG#v}"
          echo "Building tagged release ${APPLE_MAIL_MCP_VERSION}"
        fi
      - bash apple-mail-mcpb/build-mcpb.sh
      - |
        n=$(jq '.tools | length' apple-mail-mcpb/manifest.json)
        [ "$n" -eq 37 ] || { echo "ERROR: Expected 37 tools, got $n"; exit 1; }
        echo "OK: $n tools in manifest"
      - |
        if [ -n "${CI_COMMIT_TAG}" ]; then
          MCPB="apple-mail-mcp-${CI_COMMIT_TAG}.mcpb"
          test -f "$MCPB" || { echo "Missing tagged build artifact: $MCPB"; exit 1; }
          sha256sum "$MCPB" > "$MCPB.sha256"
        else
          echo "Non-tag build: skipping release asset checksum generation"
        fi

  - name: github-release
    image: dhi.io/alpine-base:3.23-dev@sha256:f7b74374e3e07e765ff2dabec26e636b55cb222b4e905b9251405ef47637f9af
    depends_on:
      - build-mcpb
    when:
      - event: tag
    environment:
      GITHUB_TOKEN:
        from_secret: github_token
    commands:
      - apk add --no-cache -X https://dl-cdn.alpinelinux.org/alpine/v3.23/community git github-cli
      - |
        export GH_TOKEN="${GITHUB_TOKEN}"
        MCPB="apple-mail-mcp-${CI_COMMIT_TAG}.mcpb"
        test -f "$MCPB" || { echo "Missing: $MCPB"; exit 1; }
        test -f "$MCPB.sha256" || { echo "Missing: $MCPB.sha256"; exit 1; }
        REPO="sm-moshi/apple-mail-mcp"
        # semantic-release creates a draft release; upload assets then publish
        gh release upload "${CI_COMMIT_TAG}" "$MCPB" "$MCPB.sha256" --repo "$REPO" --clobber
        gh release edit "${CI_COMMIT_TAG}" --repo "$REPO" --draft=false

  - name: update-homebrew
    image: dhi.io/alpine-base:3.23-dev@sha256:f7b74374e3e07e765ff2dabec26e636b55cb222b4e905b9251405ef47637f9af
    depends_on:
      - github-release
    when:
      - event: tag
    environment:
      GITHUB_TOKEN:
        from_secret: github_token
    commands:
      - apk add --no-cache -X https://dl-cdn.alpinelinux.org/alpine/v3.23/community curl github-cli jq
      - |
        export GH_TOKEN="${GITHUB_TOKEN}"
        VERSION="${CI_COMMIT_TAG#v}"
        TARBALL_URL="https://github.com/sm-moshi/apple-mail-mcp/archive/refs/tags/${CI_COMMIT_TAG}.tar.gz"
        echo "Fetching SHA256 for ${TARBALL_URL}..."
        SHA256=$(curl -sL "$TARBALL_URL" | sha256sum | cut -d' ' -f1)
        echo "Version=${VERSION} SHA256=${SHA256}"

        TAP_REPO="sm-moshi/tap"
        FILE_PATH="Formula/apple-mail-mcp.rb"

        # Fetch current file content and SHA
        FILE_DATA=$(gh api "repos/${TAP_REPO}/contents/${FILE_PATH}" --jq '{sha: .sha, content: .content}')
        FILE_SHA=$(echo "$FILE_DATA" | jq -r .sha)
        CONTENT=$(echo "$FILE_DATA" | jq -r .content | base64 -d)

        # Update URL and SHA256 in formula
        UPDATED=$(echo "$CONTENT" \
          | sed "s|url \"https://github.com/sm-moshi/apple-mail-mcp/archive/refs/tags/v.*\.tar\.gz\"|url \"https://github.com/sm-moshi/apple-mail-mcp/archive/refs/tags/${CI_COMMIT_TAG}.tar.gz\"|" \
          | sed "s|sha256 \"[a-f0-9]\{64\}\"|sha256 \"${SHA256}\"|")

        # Skip if no changes
        if [ "$CONTENT" = "$UPDATED" ]; then
          echo "No changes needed"
          exit 0
        fi

        # Commit via GitHub API
        ENCODED=$(echo "$UPDATED" | base64 | tr -d '\n')
        gh api "repos/${TAP_REPO}/contents/${FILE_PATH}" \
          --method PUT \
          --field message="chore(apple-mail-mcp): bump to ${VERSION}" \
          --field content="$ENCODED" \
          --field sha="$FILE_SHA" \
          --field committer='{"name":"Woodpecker CI","email":"ci@m0sh1.cc"}'
        echo "Updated ${FILE_PATH} to ${VERSION}"
